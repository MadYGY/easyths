Global:
  use_gpu: true
  # Character set (auto-sorted at runtime for consistent index mapping)
  character: "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz"
  img_h: 64
  img_w: 256
  seed: 42
  output_dir: "outputs"
  resume: true

Architecture:
  backbone:
    nc: 1  # 1=grayscale, 3=RGB
  head:
    hidden_dim: 128

Optimizer:
  lr: 0.0001
  weight_decay: 0.00001

Scheduler:
  type: onecycle  # onecycle or cosine
  epochs: 150
  # OneCycleLR params
  max_lr: 0.003
  div_factor: 25        # initial_lr = max_lr / div_factor = 1.2e-4
  final_div_factor: 1000 # final_lr = max_lr / (div_factor * final_div_factor) = 1.2e-7
  pct_start: 0.3         # 30% warmup, 70% decay

Training:
  batch_size: 64
  num_workers: 4
  save_interval: 20
  early_stopping:
    patience: 20
    min_delta: 0.001

DataAugmentation:
  enabled: true
  brightness_prob: 0.5
  brightness_range: [0.8, 1.2]
  contrast_prob: 0.5
  contrast_range: [0.8, 1.2]
  rotation_prob: 0.3
  rotation_range: [-5, 5]
  noise_prob: 0.3
  noise_std: 0.02
  blur_prob: 0.2
  blur_kernel_range: [3, 5]
  cutout_prob: 0.1
  cutout_size: 10

Dataset:
  train_dir: data/train
  val_dir: data/val

Eval:
  test_dir: data/test

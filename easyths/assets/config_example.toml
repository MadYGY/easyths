# ==============================================
# QuantTrader Configuration Example
# ==============================================
# Copy this file to config.toml and update the values
# ==============================================

[app]
name = "同花顺交易自动化"
version = "1.0.0"

[trading]
app_path = "C:/同花顺远航版/transaction/xiadan.exe"
# 验证码类型:
# - 留空或填写“数字验证码”时，使用 ddddocr
# - 填写“复杂验证码”时，使用 SVM 模型识别数字+大小写字母验证码
captcha_type = "数字验证码"

[queue]
max_size = 1000
priority_levels = 5
batch_size = 10

[api]
host = "0.0.0.0"
port = 7648
# MCP 服务端传输类型: http, streamable-http, sse
mcp_server_type = "streamable-http"
rate_limit = 100
# CORS 允许的源，* 表示允许所有，逗号分隔多个源
cors_origins = "*"
# API 密钥，可为空；设置后所有 API 请求都需要 Authorization: Bearer <api_key>
key = ""
# IP 白名单，留空表示允许所有 IP，支持通配符，例如 127.0.0.1,192.168.1.*
ip_whitelist = ""

[logging]
level = "INFO"
# 默认位置: "C:/Users/你的用户名/easyths/log.txt"
file = ""
